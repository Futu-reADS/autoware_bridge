# It directly uses autowarefoundation/autoware-github-actions for now
# but may change using Futu-reADS/autoware-github-actions
# that will be forked or mirrored from the original

name: build-and-test

on:
  push:
  ### schedule:
  ###   - cron: 0 0 * * *
  workflow_dispatch:

jobs:
  build-and-test:
    ### if: ${{ github.event_name != 'push' || github.ref_name == github.event.repository.default_branch }}
    runs-on: ubuntu-22.04
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      # Currently, only for ROS 2 Humble
      matrix:
        rosdistro:
          - humble
        include:
          - rosdistro: humble
            container: ros:humble
            build-depends-repos: build_depends.repos
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Show disk space before the tasks
        run: df -h

      - name: Update OS package
        run: |
          sudo apt-get update -qy
          sudo apt-get upgrade -qy

      - name: Remove exec_depend
        uses: autowarefoundation/autoware-github-actions/remove-exec-depend@v1

      - name: Get self packages
        id: get-self-packages
        uses: autowarefoundation/autoware-github-actions/get-self-packages@v1

      - name: Check build_depends.repos
        id: check-file
        run: |
          if [ -f build_depends.repos ]; then
            echo "build_depends_repos=true" >> $GITHUB_OUTPUT
          else
            echo "build_depends_repos=false" >> $GITHUB_OUTPUT
          fi

      - name: Copy our latest autoware.repos
        if: ${{ steps.check-file.outputs.build_depends_repos != 'true' }}
        uses: actions/checkout@v4
        with:
          repository: Futu-reADS/autoware.FTD
          sparse-checkout: |
            autoware.repos
          sparse-checkout-cone-mode: false
          path: autoware.FTD
      - run: |
          cd autoware.FTD
          cp autoware.repos ../build_depends.repos
          # Do not process here afterwards
          touch AMENT_IGNORE COLCON_IGNORE

      - name: Install more dependent packages
        run: |
          # Install dependent packages
          sudo apt-get install -y ros-humble-autoware-common-msgs
          sudo apt-get install -y libunwind-dev

      - name: Diagnose environment
        run: |
          set -o xtrace
          env
          ls -l /opt/ros/humble/ || true
          source /opt/ros/humble/setup.bash || true
          nl -ba /opt/ros/humble/setup.bash || true
          env

      - name: Set environment variables
        run: |
          # FIXME:
          # The reason is unclear, but setup.bash does not set the following
          # environment variables correctly
          # Here, it supposed to run with ROS 2 Humble
          # Update here accordingly if strategy.matrix changes
          source /opt/ros/humble/setup.bash || true
          if [ -z "$AMENT_PREFIX_PATH" ]; then
            export AMENT_PREFIX_PATH='/opt/ros/humble'
          fi
          if [ -z "$CMAKE_PREFIX_PATH" ]; then
            export CMAKE_PREFIX_PATH='/opt/ros/humble/share'
          fi
          if [ -z "$(echo "$LD_LIBRARY_PATH" | tr ':' '\n' | grep -xF /opt/ros/humble/lib)" ]; then
            if [ -z "$LD_LIBRARY_PATH" ]; then
              export LD_LIBRARY_PATH='/opt/ros/humble/lib'
            else
              export LD_LIBRARY_PATH="$LD_LIBRARY_PATH:/opt/ros/humble/lib"
            fi
          fi
          if [ -z "$(echo "$PATH" | tr ':' '\n' | grep -xF /opt/ros/humble/bin)" ]; then
            if [ -z "$PATH" ]; then
              export PATH='/opt/ros/humble/bin'
            else
              export PATH="$PATH:/opt/ros/humble/bin"
            fi
          fi
          for _pythonpath in /opt/ros/humble/lib/python*/*-packages /opt/ros/humble/local/lib/python*/*-packages; do
            if [ -d "$_pythonpath" ]; then
              if [ -z "$(echo "$PYTHONPATH" | tr ':' '\n' | grep -xF "$_pythonpath")" ]; then
                if [ -z "$PYTHONPATH" ]; then
                  export PYTHONPATH="$_pythonpath"
                else
                  export PYTHONPATH="$PYTHONPATH:$_pythonpath"
                fi
              fi
            fi
          done
          # Pass to the subsequent steps
          env | grep -E '^(AMENT_PREFIX_PATH|CMAKE_PREFIX_PATH|LD_LIBRARY_PATH|PATH|PYTHONPATH)=' >> "$GITHUB_ENV"

      - name: Set Git credential for private repos
        run: |
          git config --global credential.helper store
          echo "url=${{ github.server_url }}" > ~/url-username-password.txt
          echo "username=${{ github.actor }}" >> ~/url-username-password.txt
          echo "password=${{ secrets.UNITTEST_WORKFLOW_TOKEN }}" >> ~/url-username-password.txt
          git credential approve < ~/url-username-password.txt

